<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginação</title>
    <style>
        /* Remove os estilos padrão da lista e alinha os itens horizontalmente */
        .paginacao {
            display: inline-flex;
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        /* Estilo padrão para os links de paginação */
        .paginacao > .paginacao-item > .paginacao-link {
            display: block;
            padding: 8px 16px;
            color: #007bff; /* Cor azul dos números */
            text-decoration: none;
            background-color: #ffffff;
            border: 1px solid #dee2e6; /* Cor da borda cinza clara */
            margin-left: -1px; /* Puxa o item para a esquerda para evitar bordas duplas */
            font-family: Arial, sans-serif;
        }

        /* Arredonda os cantos esquerdos do primeiro item e remove a margem negativa */
        .paginacao > .paginacao-item:first-child > .paginacao-link {
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            margin-left: 0;
        }

        /* Arredonda os cantos direitos do último item */
        .paginacao > .paginacao-item:last-child > .paginacao-link {
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        /* Efeito Hover (Quando passar o mouse) */
        .paginacao > .paginacao-item > .paginacao-link:hover {
            background-color: #e9ecef; /* Fundo cinza claro */
            color: #333333; /* Muda o texto para um tom escuro */
        }
    </style>
</head>
<body>

    <ul class="paginacao">
        <li class="paginacao-item"><a href="#" class="paginacao-link">&laquo;</a></li>
        <li class="paginacao-item"><a href="#" class="paginacao-link">1</a></li>
        <li class="paginacao-item"><a href="#" class="paginacao-link">2</a></li>
        <li class="paginacao-item"><a href="#" class="paginacao-link">3</a></li>
        <li class="paginacao-item"><a href="#" class="paginacao-link">&raquo;</a></li>
    </ul>

</body>
</html>
